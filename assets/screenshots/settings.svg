<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2F1A"/>
      <stop offset="100%" stop-color="#162816"/>
    </linearGradient>
  </defs>
  <rect width="375" height="812" rx="40" fill="url(#bg4)"/>
  <rect x="1" y="1" width="373" height="810" rx="39" fill="none" stroke="#2D4A2D" stroke-width="1"/>

  <!-- Status bar -->
  <text x="187" y="52" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#A8C8A8">9:41</text>

  <!-- Header -->
  <text x="187" y="90" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="bold" fill="#C9A84C" letter-spacing="3">SETTINGS</text>

  <!-- Swing Mode Label -->
  <text x="36" y="130" font-family="Inter,sans-serif" font-size="10" font-weight="bold" fill="#C9A84C" letter-spacing="2">SWING MODE</text>

  <!-- Mode Toggle - Club Mount -->
  <rect x="24" y="145" width="155" height="70" fill="#2D4A2D" stroke="#C9A84C" stroke-width="1"/>
  <text x="101" y="178" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#A8C8A8">&#9971;</text>
  <text x="101" y="200" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="bold" fill="#A8C8A8" letter-spacing="1.5">CLUB MOUNT</text>

  <!-- Mode Toggle - Freehand (active) -->
  <rect x="196" y="145" width="155" height="70" fill="#C9A84C" stroke="#C9A84C" stroke-width="2"/>
  <text x="273" y="178" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#1A2F1A">&#9995;</text>
  <text x="273" y="200" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="bold" fill="#1A2F1A" letter-spacing="1.5">FREEHAND</text>

  <!-- Mode description -->
  <text x="187" y="237" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">Hold phone in hand — no club needed</text>

  <!-- Arm Length -->
  <text x="36" y="272" font-family="Inter,sans-serif" font-size="10" font-weight="bold" fill="#C9A84C" letter-spacing="2">ARM LENGTH</text>
  <text x="36" y="288" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">Distance from shoulder to phone in hand</text>
  <text x="36" y="318" font-family="Inter,sans-serif" font-size="20" font-weight="bold" fill="#F5F0E8">0.70 m</text>
  <!-- Slider track -->
  <rect x="150" y="310" width="180" height="4" rx="2" fill="#2D4A2D"/>
  <rect x="150" y="310" width="98" height="4" rx="2" fill="#C9A84C"/>
  <circle cx="248" cy="312" r="8" fill="#C9A84C"/>
  <text x="145" y="340" font-family="Inter,sans-serif" font-size="9" fill="#A8C8A8">0.1</text>
  <text x="335" y="340" text-anchor="end" font-family="Inter,sans-serif" font-size="9" fill="#A8C8A8">1.2</text>

  <!-- Club Type -->
  <text x="36" y="375" font-family="Inter,sans-serif" font-size="10" font-weight="bold" fill="#C9A84C" letter-spacing="2">ESTIMATE FOR CLUB</text>
  <text x="36" y="391" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">Select a club to estimate club head speed</text>

  <!-- Club list -->
  <rect x="24" y="405" width="327" height="32" fill="#C9A84C" fill-opacity="0.15"/>
  <text x="56" y="426" font-family="Inter,sans-serif" font-size="13" font-weight="bold" fill="#C9A84C">&#10003;  Driver</text>
  <text x="339" y="426" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">45.5"</text>

  <rect x="24" y="437" width="327" height="32" fill="#2D4A2D"/>
  <text x="44" y="458" font-family="Inter,sans-serif" font-size="13" fill="#F5F0E8">3 Wood</text>
  <text x="339" y="458" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">43.0"</text>

  <rect x="24" y="469" width="327" height="32" fill="#2D4A2D"/>
  <text x="44" y="490" font-family="Inter,sans-serif" font-size="13" fill="#F5F0E8">5 Wood</text>
  <text x="339" y="490" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">42.0"</text>

  <rect x="24" y="501" width="327" height="32" fill="#2D4A2D"/>
  <text x="44" y="522" font-family="Inter,sans-serif" font-size="13" fill="#F5F0E8">7 Iron</text>
  <text x="339" y="522" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">37.0"</text>

  <text x="187" y="555" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#A8C8A8">+ 10 more clubs</text>

  <!-- Effective pivot -->
  <text x="187" y="585" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#A8C8A8">Effective pivot: 0.70m arm + 1.16m shaft = 1.86m</text>

  <!-- Lag Factor -->
  <text x="36" y="620" font-family="Inter,sans-serif" font-size="10" font-weight="bold" fill="#C9A84C" letter-spacing="2">WRIST LAG FALLBACK</text>
  <text x="36" y="636" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">Auto-detected per swing. Fallback for short swings.</text>
  <text x="36" y="666" font-family="Inter,sans-serif" font-size="20" font-weight="bold" fill="#F5F0E8">1.20</text>
  <!-- Slider track -->
  <rect x="150" y="658" width="180" height="4" rx="2" fill="#2D4A2D"/>
  <rect x="150" y="658" width="72" height="4" rx="2" fill="#C9A84C"/>
  <circle cx="222" cy="660" r="8" fill="#C9A84C"/>
  <text x="145" y="686" font-family="Inter,sans-serif" font-size="9" fill="#A8C8A8">1.0</text>
  <text x="335" y="686" text-anchor="end" font-family="Inter,sans-serif" font-size="9" fill="#A8C8A8">1.5</text>

  <!-- Bottom Nav -->
  <rect x="0" y="752" width="375" height="60" fill="#1A2F1A"/>
  <line x1="0" y1="752" x2="375" y2="752" stroke="#2D4A2D" stroke-width="1"/>
  <circle cx="94" cy="775" r="3" fill="#A8C8A8"/>
  <text x="94" y="795" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#A8C8A8">Home</text>
  <circle cx="187" cy="775" r="3" fill="#A8C8A8"/>
  <text x="187" y="795" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#A8C8A8">History</text>
  <circle cx="281" cy="775" r="3" fill="#C9A84C"/>
  <text x="281" y="795" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#C9A84C">Settings</text>
</svg>
