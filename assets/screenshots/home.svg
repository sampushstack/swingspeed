<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2F1A"/>
      <stop offset="100%" stop-color="#162816"/>
    </linearGradient>
  </defs>
  <!-- Phone frame -->
  <rect width="375" height="812" rx="40" fill="url(#bg)"/>
  <rect x="1" y="1" width="373" height="810" rx="39" fill="none" stroke="#2D4A2D" stroke-width="1"/>

  <!-- Status bar -->
  <text x="187" y="52" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#A8C8A8">9:41</text>

  <!-- Title -->
  <text x="187" y="100" text-anchor="middle" font-family="Georgia,serif" font-size="26" font-weight="bold" fill="#C9A84C" letter-spacing="4">SWINGSPEED</text>

  <!-- Personal Best Card -->
  <rect x="24" y="130" width="327" height="110" fill="#2D4A2D"/>
  <line x1="24" y1="130" x2="351" y2="130" stroke="#C9A84C" stroke-width="2"/>
  <text x="187" y="162" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="bold" fill="#C9A84C" letter-spacing="4">PERSONAL BEST</text>
  <text x="187" y="212" text-anchor="middle" font-family="Georgia,serif" font-size="42" font-weight="bold" fill="#F5F0E8">94.7</text>
  <text x="187" y="230" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#A8C8A8">mph</text>

  <!-- Recent Sessions Label -->
  <text x="36" y="280" font-family="Inter,sans-serif" font-size="10" font-weight="bold" fill="#C9A84C" letter-spacing="2">RECENT SESSIONS</text>

  <!-- Session Row 1 -->
  <rect x="24" y="296" width="327" height="56" fill="#2D4A2D"/>
  <line x1="24" y1="296" x2="24" y2="352" stroke="#C9A84C" stroke-width="2"/>
  <text x="36" y="320" font-family="Inter,sans-serif" font-size="14" fill="#F5F0E8">3/28/2026</text>
  <text x="187" y="320" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#A8C8A8">12 swings</text>
  <text x="339" y="320" text-anchor="end" font-family="Inter,sans-serif" font-size="14" font-weight="bold" fill="#C9A84C">94.7 mph</text>
  <text x="36" y="340" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">Avg 82.3 mph</text>
  <text x="339" y="340" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">Score: 78</text>

  <!-- Session Row 2 -->
  <rect x="24" y="360" width="327" height="56" fill="#2D4A2D"/>
  <line x1="24" y1="360" x2="24" y2="416" stroke="#C9A84C" stroke-width="2"/>
  <text x="36" y="384" font-family="Inter,sans-serif" font-size="14" fill="#F5F0E8">3/27/2026</text>
  <text x="187" y="384" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#A8C8A8">8 swings</text>
  <text x="339" y="384" text-anchor="end" font-family="Inter,sans-serif" font-size="14" font-weight="bold" fill="#C9A84C">89.2 mph</text>
  <text x="36" y="404" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">Avg 79.1 mph</text>
  <text x="339" y="404" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">Score: 82</text>

  <!-- Session Row 3 -->
  <rect x="24" y="424" width="327" height="56" fill="#2D4A2D"/>
  <line x1="24" y1="424" x2="24" y2="480" stroke="#C9A84C" stroke-width="2"/>
  <text x="36" y="448" font-family="Inter,sans-serif" font-size="14" fill="#F5F0E8">3/25/2026</text>
  <text x="187" y="448" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#A8C8A8">15 swings</text>
  <text x="339" y="448" text-anchor="end" font-family="Inter,sans-serif" font-size="14" font-weight="bold" fill="#C9A84C">91.5 mph</text>
  <text x="36" y="468" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">Avg 84.6 mph</text>
  <text x="339" y="468" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">Score: 85</text>

  <!-- Start Session Button -->
  <rect x="40" y="680" width="295" height="56" rx="4" fill="#C9A84C"/>
  <text x="187" y="714" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="bold" fill="#1A2F1A" letter-spacing="2">START SESSION</text>

  <!-- Bottom Nav -->
  <rect x="0" y="752" width="375" height="60" fill="#1A2F1A"/>
  <line x1="0" y1="752" x2="375" y2="752" stroke="#2D4A2D" stroke-width="1"/>
  <!-- Home (active) -->
  <circle cx="94" cy="775" r="3" fill="#C9A84C"/>
  <text x="94" y="795" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#C9A84C">Home</text>
  <!-- History -->
  <circle cx="187" cy="775" r="3" fill="#A8C8A8"/>
  <text x="187" y="795" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#A8C8A8">History</text>
  <!-- Settings -->
  <circle cx="281" cy="775" r="3" fill="#A8C8A8"/>
  <text x="281" y="795" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#A8C8A8">Settings</text>
</svg>
