<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2F1A"/>
      <stop offset="100%" stop-color="#162816"/>
    </linearGradient>
  </defs>
  <rect width="375" height="812" rx="40" fill="url(#bg3)"/>
  <rect x="1" y="1" width="373" height="810" rx="39" fill="none" stroke="#2D4A2D" stroke-width="1"/>

  <!-- Status bar -->
  <text x="187" y="52" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#A8C8A8">9:41</text>

  <!-- Header -->
  <text x="187" y="90" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="bold" fill="#C9A84C" letter-spacing="3">SESSION SUMMARY</text>

  <!-- Personal Best Badge -->
  <rect x="60" y="108" width="255" height="38" rx="0" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="187" y="133" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#C9A84C">NEW PERSONAL BEST!</text>

  <!-- Stat Row -->
  <rect x="24" y="164" width="327" height="72" fill="#2D4A2D"/>
  <line x1="24" y1="164" x2="351" y2="164" stroke="#C9A84C" stroke-width="2"/>

  <text x="65" y="186" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="bold" fill="#C9A84C" letter-spacing="1.5">SWINGS</text>
  <text x="65" y="212" text-anchor="middle" font-family="Inter,sans-serif" font-size="22" font-weight="bold" fill="#F5F0E8">12</text>

  <text x="145" y="186" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="bold" fill="#C9A84C" letter-spacing="1.5">PEAK</text>
  <text x="145" y="212" text-anchor="middle" font-family="Inter,sans-serif" font-size="22" font-weight="bold" fill="#F5F0E8">94.7</text>

  <text x="230" y="186" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="bold" fill="#C9A84C" letter-spacing="1.5">AVG</text>
  <text x="230" y="212" text-anchor="middle" font-family="Inter,sans-serif" font-size="22" font-weight="bold" fill="#F5F0E8">82.3</text>

  <text x="315" y="186" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="bold" fill="#C9A84C" letter-spacing="1.5">CONSISTENCY</text>
  <text x="315" y="212" text-anchor="middle" font-family="Inter,sans-serif" font-size="22" font-weight="bold" fill="#F5F0E8">78</text>

  <!-- Speed Distribution Label -->
  <text x="36" y="268" font-family="Inter,sans-serif" font-size="10" font-weight="bold" fill="#C9A84C" letter-spacing="3">SPEED DISTRIBUTION</text>

  <!-- Bar Chart -->
  <g transform="translate(50, 290)">
    <!-- Bars -->
    <rect x="0" y="80" width="36" height="20" fill="#C9A84C" rx="1"/>
    <rect x="50" y="50" width="36" height="50" fill="#C9A84C" rx="1"/>
    <rect x="100" y="10" width="36" height="90" fill="#C9A84C" rx="1"/>
    <rect x="150" y="30" width="36" height="70" fill="#C9A84C" rx="1"/>
    <rect x="200" y="60" width="36" height="40" fill="#C9A84C" rx="1"/>
    <rect x="250" y="85" width="36" height="15" fill="#C9A84C" rx="1"/>
    <!-- Labels -->
    <text x="18" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#A8C8A8">70</text>
    <text x="68" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#A8C8A8">75</text>
    <text x="118" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#A8C8A8">80</text>
    <text x="168" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#A8C8A8">85</text>
    <text x="218" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#A8C8A8">90</text>
    <text x="268" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#A8C8A8">95</text>
  </g>

  <!-- Swing Timeline Label -->
  <text x="36" y="440" font-family="Inter,sans-serif" font-size="10" font-weight="bold" fill="#C9A84C" letter-spacing="3">SWING TIMELINE</text>

  <!-- Timeline rows -->
  <rect x="24" y="455" width="327" height="36" fill="#2D4A2D"/>
  <line x1="24" y1="455" x2="24" y2="491" stroke="#C9A84C" stroke-width="2" opacity="0.3"/>
  <text x="40" y="478" font-family="Inter,sans-serif" font-size="12" fill="#A8C8A8">#1</text>
  <text x="140" y="478" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="bold" fill="#F5F0E8">78.2 mph</text>
  <text x="230" y="478" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">-2.1° down</text>
  <text x="330" y="478" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">0.31s</text>

  <rect x="24" y="495" width="327" height="36" fill="#2D4A2D"/>
  <line x1="24" y1="495" x2="24" y2="531" stroke="#C9A84C" stroke-width="2" opacity="0.3"/>
  <text x="40" y="518" font-family="Inter,sans-serif" font-size="12" fill="#A8C8A8">#2</text>
  <text x="140" y="518" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="bold" fill="#F5F0E8">81.5 mph</text>
  <text x="230" y="518" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">-1.8° down</text>
  <text x="330" y="518" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">0.28s</text>

  <rect x="24" y="535" width="327" height="36" fill="#2D4A2D"/>
  <line x1="24" y1="535" x2="24" y2="571" stroke="#C9A84C" stroke-width="2" opacity="0.3"/>
  <text x="40" y="558" font-family="Inter,sans-serif" font-size="12" fill="#A8C8A8">#3</text>
  <text x="140" y="558" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="bold" fill="#F5F0E8">85.9 mph</text>
  <text x="230" y="558" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">+0.5° up</text>
  <text x="330" y="558" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">0.30s</text>

  <rect x="24" y="575" width="327" height="36" fill="#2D4A2D"/>
  <line x1="24" y1="575" x2="24" y2="611" stroke="#C9A84C" stroke-width="2" opacity="0.3"/>
  <text x="40" y="598" font-family="Inter,sans-serif" font-size="12" fill="#A8C8A8">#4</text>
  <text x="140" y="598" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="bold" fill="#C9A84C">94.7 mph</text>
  <text x="230" y="598" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">-3.4° down</text>
  <text x="330" y="598" text-anchor="end" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">0.26s</text>

  <!-- More indicator -->
  <text x="187" y="638" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#A8C8A8">+ 8 more swings</text>

  <!-- Done Button -->
  <rect x="40" y="680" width="295" height="56" rx="4" fill="#C9A84C"/>
  <text x="187" y="714" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="bold" fill="#1A2F1A" letter-spacing="2">DONE</text>
</svg>
